// ── Constants ─────────────────────────────────────────────────────────────────
const BUILT_IN_GAMES={
  catan:   {name:"Catan",   emoji:"🏝️",categories:["Settlements","Cities","Longest Road","Largest Army","Dev Cards","Special VP"]},
  wingspan:{name:"Wingspan",emoji:"🐦",categories:["Birds","Bonus Cards","End-of-Round Goals","Eggs","Food on Cards","Tucked Cards"]},
  scrabble:{name:"Scrabble",emoji:"🔡",categories:["Round 1","Round 2","Round 3","Round 4","Round 5","Round 6","Round 7","Round 8","Tile Penalty"]},
  custom:  {name:"Custom",  emoji:"🎲",categories:[]},
};
const TEAM_COLORS=[C.tomato,"#3498db","#2ecc71","#f39c12"];
const TEAM_EMOJIS=["🔴","🔵","🟢","🟡"];

// ── Storage ───────────────────────────────────────────────────────────────────
function localLoad(){try{return JSON.parse(localStorage.getItem("bgs_v2")||"null");}catch{return null;}}
function localSave(s){try{localStorage.setItem("bgs_v2",JSON.stringify(s));}catch{}}

// ── Helpers ───────────────────────────────────────────────────────────────────
const calcTotal=p=>p?.scores?Object.values(p.scores).reduce((s,v)=>s+(parseInt(v)||0),0):0;

function buildLeaderboard(history){
  const players={};
  history.forEach(game=>{
    if(!game.finished) return;
    let individuals=game.players;
    if(game.teamMode&&game.teams){
      const allMembers=game.teams.flatMap(t=>t.members);
      const hasTeamNames=game.players.some(p=>!allMembers.includes(p.name));
      if(hasTeamNames){
        individuals=game.teams.flatMap(team=>{
          const tp=game.players.find(p=>p.name===team.name);
          const sz=Math.max(1,team.members.length);
          return team.members.map(n=>({name:n,team:team.name,scores:tp?Object.fromEntries(Object.entries(tp.scores).map(([k,v])=>[k,String(Math.round((parseInt(v)||0)/sz))])):{}   }));
        });
      }
    }
    const teamTotals={};
    if(game.teamMode&&game.teams) game.teams.forEach(team=>{const mems=individuals.filter(p=>team.members.includes(p.name));teamTotals[team.name]=mems.reduce((s,p)=>s+calcTotal(p),0);});
    const maxTotal=game.teamMode&&game.teams?Math.max(...Object.values(teamTotals),0):Math.max(...individuals.map(calcTotal),0);
    individuals.forEach(p=>{
      if(!players[p.name]) players[p.name]={name:p.name,wins:0,games:0,totalScore:0};
      const teamSize=game.teamMode&&game.teams?Math.max(1,game.teams.find(t=>t.members.includes(p.name))?.members.length||1):1;
      const teamName=game.teamMode&&game.teams?game.teams.find(t=>t.members.includes(p.name))?.name:null;
      const teamTotal=teamName?teamTotals[teamName]:calcTotal(p);
      players[p.name].games+=1;
      players[p.name].totalScore+=Math.round(teamTotal/teamSize);
      if(teamName?teamTotal===maxTotal:calcTotal(p)===maxTotal) players[p.name].wins+=1/teamSize;
    });
  });
  return Object.values(players).map(p=>({...p,wins:Math.round(p.wins*100)/100,winRate:p.games>0?p.wins/p.games:0,avgScore:p.games>0?Math.round(p.totalScore/p.games):0}));
}

function newGame(gameKey,playerNames,cats,customName,customEmoji,teamMode,teams){
  const def=BUILT_IN_GAMES[gameKey]||{name:customName,emoji:customEmoji||"🎲",categories:cats};
  const categories=gameKey==="custom"?cats:def.categories;
  const emoji=gameKey==="custom"?(customEmoji||"🎲"):def.emoji;
  const players=teamMode&&teams?teams.flatMap(team=>team.members.map(n=>({name:n,scores:Object.fromEntries(categories.map(c=>[c,""])),team:team.name}))):playerNames.map(n=>({name:n,scores:Object.fromEntries(categories.map(c=>[c,""]))}));
  return{id:Date.now(),gameKey,gameName:gameKey==="custom"?(customName||"Custom Game"):def.name,emoji,categories,players,teamMode:!!teamMode,teams:teamMode?teams:null,startedAt:new Date().toISOString(),finished:false};
}

// ── Reducer ───────────────────────────────────────────────────────────────────
const INIT={screen:"home",history:[],templates:{},current:null,family:null,detailId:null};
function reducer(state,action){
  switch(action.type){
    case "HYDRATE":return{...state,...action.payload};
    case "GO":return{...state,screen:action.screen,detailId:action.id??state.detailId};
    case "START_GAME":return{...state,screen:"game",current:newGame(action.gameKey,action.players,action.cats,action.customName,action.customEmoji,action.teamMode,action.teams)};
    case "SET_SCORE":{const c={...state.current};c.players=c.players.map((p,pi)=>pi===action.pi?{...p,scores:{...p.scores,[action.cat]:action.val}}:p);return{...state,current:c};}
    case "ADD_CATEGORY":{const c={...state.current};c.categories=[...c.categories,action.cat];c.players=c.players.map(p=>({...p,scores:{...p.scores,[action.cat]:""}}));return{...state,current:c};}
    case "FINISH":{
      const fin={...state.current,finished:true,finishedAt:new Date().toISOString()};
      const tKey=fin.gameKey==="custom"?fin.gameName:fin.gameKey;
      const templates={...state.templates};
      if(!templates[tKey]) templates[tKey]={gameKey:fin.gameKey,name:fin.gameName,gameName:fin.gameName,emoji:fin.emoji,categories:fin.categories};
      return{...state,screen:"home",current:null,history:[fin,...state.history],templates};
    }
    case "DELETE_HISTORY":
      const updated = state.history.filter(g=>g.id!==action.id);
      if (state.family && sb) {
        dbSave(state.family, updated).catch(()=>{});
      }
      return {...state, history: updated};
    case "SET_FAMILY":return{...state,family:action.family};
    case "SYNC_HISTORY":return{...state,history:action.history};
    default:return state;
  }
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [state,dispatch]=useReducer(reducer,INIT);
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{const s=localLoad();if(s) dispatch({type:"HYDRATE",payload:s});},[]);
  useEffect(()=>{localSave({history:state.history,templates:state.templates,family:state.family,current:state.current});},[state.history,state.templates,state.family,state.current]);
  useEffect(()=>{
    if(!state.family||!sb) return;
    (async()=>{setSyncing(true);const games=await dbLoad(state.family);if(games) dispatch({type:"SYNC_HISTORY",history:games});setSyncing(false);})();
  },[state.family,state.screen]);
  const finishGame=useCallback(async()=>{
    dispatch({type:"FINISH"});
    if(state.family&&sb&&state.current){
      const fin={...state.current,finished:true,finishedAt:new Date().toISOString()};
      const existing=await dbLoad(state.family)||[];
      await dbSave(state.family,[fin,...existing.filter(g=>g.id!==fin.id)]);
    }
  },[state.family,state.current]);
  const screens={home:HomeScreen,setup:SetupScreen,game:GameScreen,history:HistoryScreen,historyDetail:HistoryDetail,leaderboard:LeaderboardScreen,family:FamilyScreen};
  const Screen=screens[state.screen]||HomeScreen;
  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:C.bg,color:C.ink,fontFamily:"'Courier New',monospace"}}>
      {syncing&&<div style={{background:C.tomato,color:C.white,textAlign:"center",fontSize:12,padding:"4px 0"}}>Syncing…</div>}
      {!sb&&<div style={{background:C.lime,color:C.muted,textAlign:"center",fontSize:11,padding:"4px 8px",borderBottom:`2px solid ${C.ink}`}}>⚠️ Supabase not configured — family sync disabled</div>}
      <Screen state={state} dispatch={dispatch} finishGame={finishGame}/>
      <BottomNav screen={state.screen} dispatch={dispatch} state={state}/>
    </div>
  );
}

// ── Bottom Nav ────────────────────────────────────────────────────────────────
function BottomNav({screen,dispatch,state}){
  const tabs=[{id:"home",label:"Home",icon:"🏠"},{id:"leaderboard",label:"Board",icon:"🏆"},{id:"history",label:"History",icon:"📋"},{id:"family",label:"Family",icon:"👨‍👩‍👧"}];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:`3px solid ${C.ink}`,display:"flex"}}>

        <button onClick={()=>dispatch({type:"GO",screen:"game"})}
          style={{position:"absolute",top:-44,left:"50%",transform:"translateX(-50%)",background:C.tomato,border:`2px solid ${C.ink}`,color:C.white,borderRadius:20,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",boxShadow:`3px 3px 0 ${C.ink}`}}>
          ▶ Resume Game
        </button>
      )}
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>dispatch({type:"GO",screen:t.id})}
          style={{flex:1,background:"none",border:"none",color:screen===t.id?C.tomato:C.muted,padding:"10px 0 8px",cursor:"pointer",fontSize:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontWeight:700}}>
          <span style={{fontSize:20}}>{t.icon}</span>{t.label}
        </button>
      ))}
    </div>
  );
}

// ── Home ──────────────────────────────────────────────────────────────────────
function HomeScreen({state,dispatch}){
  const lb=buildLeaderboard(state.history);
  const maxG=Math.max(...lb.map(p=>p.games),1);
  const top=[...lb].sort((a,b)=>(b.winRate*0.6+(b.games/maxG)*0.4)-(a.winRate*0.6+(a.games/maxG)*0.4))[0];
  return(
    <div style={{padding:"20px 20px 80px"}}>
      <h1 style={{textAlign:"center",fontSize:34,margin:"24px 0 4px",fontFamily:"Georgia,serif",fontWeight:900,color:C.ink,letterSpacing:-1}}>🎲 Score Keeper</h1>
      {state.family&&<p style={{textAlign:"center",color:C.muted,fontSize:12,marginBottom:8}}>👨‍👩‍👧 <b style={{color:C.card}}>{state.family}</b></p>}
      <div style={{...S.limeCard,padding:"14px 18px",marginBottom:12,textAlign:"center"}}>
        <div onClick={()=>dispatch({type:"GO",screen:"setup"})} style={{cursor:"pointer"}}>
          <div style={{fontSize:28,fontWeight:900,fontFamily:"Georgia,serif",color:C.ink}}>+ New Game</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>Tap to start playing</div>
        </div>
      </div>
      {top&&(
        <div style={{background:C.tomato,border:`2px solid ${C.ink}`,borderRadius:14,boxShadow:`3px 3px 0 ${C.ink}`,padding:"14px 18px",marginBottom:20,textAlign:"center"}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",marginBottom:2,letterSpacing:2}}>⭐ TOP PLAYER</div>
          <div style={{fontSize:24,fontWeight:900,fontFamily:"Georgia,serif",color:C.white}}>{top.name}</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.85)"}}>{Math.round(top.winRate*100)}% win rate · {top.wins} wins</div>
        </div>
      )}
      {state.history.length>0&&<>
        <h3 style={{...secHead,marginTop:20}}>Recent Games</h3>
        {state.history.slice(0,3).map(g=><HistoryCard key={g.id} game={g} dispatch={dispatch}/>)}
      </>}
    </div>
  );
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function SetupScreen({state,dispatch}){
  const EMOJI_OPTS=["🎲","🃏","♟","🎯","🧩","🎮","🏆","🌍","🐉","🚂","🏰","🌿","⚔","🔮","🎪","🦁","🚀","🍀","🎠","💎","🫘","🐱","🌸","🏟️"];
  const [gameKey,setGameKey]=useState(null);
  const [cats,setCats]=useState([""]);
  const [custName,setCustName]=useState("");
  const [custEmoji,setCustEmoji]=useState("🎲");
  const [showPick,setShowPick]=useState(false);
  const [teamMode,setTeamMode]=useState(false);
  const [numTeams,setNumTeams]=useState(2);
  const [teams,setTeams]=useState([{name:"Team 1",members:[]},{name:"Team 2",members:[]},{name:"Team 3",members:[]},{name:"Team 4",members:[]}]);
  const [solo,setSolo]=useState([]);
  const [newName,setNewName]=useState("");

  const lastPlayed={};
  state.history.forEach(g=>{const k=g.gameKey==="custom"?g.gameName:g.gameKey;if(!lastPlayed[k]) lastPlayed[k]=g.finishedAt||g.startedAt;});
  const allGames={...BUILT_IN_GAMES};
  Object.entries(state.templates||{}).forEach(([k,t])=>{allGames[k]={...t,name:t.name||t.gameName||k};});
  const gameList=Object.entries(allGames).sort(([ka],[kb])=>{const ta=lastPlayed[ka]||null,tb=lastPlayed[kb]||null;if(ta&&tb) return new Date(tb)-new Date(ta);if(ta) return -1;if(tb) return 1;return 0;});
  const knownPlayers=[...new Set(state.history.flatMap(g=>g.teams?g.teams.flatMap(t=>t.members):g.players.map(p=>p.name)))];
  const allPool=[...new Set([...knownPlayers,...teams.flatMap(t=>t.members),...solo])];

  function pickGame(k){setGameKey(k);setCats(k!=="custom"&&allGames[k]?.categories?allGames[k].categories:[""]);setCustEmoji(allGames[k]?.emoji||"🎲");}
  function toggleSolo(n){setSolo(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);}
  function assignTeam(name,ti){setTeams(prev=>prev.map((t,i)=>{if(i===ti) return t.members.includes(name)?{...t,members:t.members.filter(m=>m!==name)}:{...t,members:[...t.members,name]};return{...t,members:t.members.filter(m=>m!==name)};}));}
  function addNew(){const n=newName.trim();if(!n) return;setNewName("");if(teamMode){const ti=teams.slice(0,numTeams).reduce((mi,t,i,arr)=>t.members.length<arr[mi].members.length?i:mi,0);setTeams(prev=>prev.map((t,i)=>i===ti?{...t,members:[...t.members,n]}:t));}else{setSolo(p=>p.includes(n)?p:[...p,n]);}}

  const activeTeams=teams.slice(0,numTeams).filter(t=>t.members.length>0);
  const validCats=cats.map((c,i)=>c.trim()||`Round ${i+1}`);
  const canStart=gameKey&&(teamMode?activeTeams.length>=2:solo.length>=1);

  return(
    <div style={{padding:"20px 20px 100px"}}>
      <TopBar title="New Game" onBack={()=>dispatch({type:"GO",screen:"home"})}/>
      <h3 style={secHead}>Choose Game</h3>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
        {gameList.map(([k,g])=>(
          <div key={k} onClick={()=>pickGame(k)} style={{...S.card,background:gameKey===k?C.tomato:C.card,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:26}}>{g.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"Georgia,serif",color:gameKey===k?C.white:C.ink}}>{g.name}</div>
              <div style={{fontSize:11,color:gameKey===k?"rgba(255,255,255,0.8)":C.muted,marginTop:2}}>{lastPlayed[k]?`Last played ${new Date(lastPlayed[k]).toLocaleDateString()}`:"Not played yet"}</div>
            </div>
            {gameKey===k&&<span style={{color:C.white,fontWeight:700}}>✓</span>}
          </div>
        ))}
      </div>

      {gameKey==="custom"&&(
        <div style={{...S.limeCard,padding:16,marginBottom:24}}>
          <h3 style={{...secHead,marginBottom:10}}>Custom Game</h3>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button onClick={()=>setShowPick(p=>!p)} style={{fontSize:24,background:C.white,border:`2px solid ${C.ink}`,borderRadius:10,padding:"10px 12px",cursor:"pointer"}}>{custEmoji}</button>
            <input style={{...inp,flex:1}} placeholder="Game name" value={custName} onChange={e=>setCustName(e.target.value)}/>
          </div>
          {showPick&&<div style={{display:"flex",flexWrap:"wrap",gap:6,background:C.white,borderRadius:10,padding:10,marginBottom:10,border:`2px solid ${C.ink}`}}>{EMOJI_OPTS.map(e=><button key={e} onClick={()=>{setCustEmoji(e);setShowPick(false);}} style={{fontSize:22,background:custEmoji===e?C.tomato:"transparent",border:"none",borderRadius:6,padding:"4px 6px",cursor:"pointer"}}>{e}</button>)}</div>}
          <h3 style={{...secHead,marginTop:12,marginBottom:8}}>Score Categories</h3>
          {cats.map((c,i)=><input key={i} style={{...inp,marginBottom:8}} placeholder={`Round ${i+1}`} value={c} onChange={e=>setCats(cats.map((x,j)=>j===i?e.target.value:x))}/>)}
          <Btn onClick={()=>setCats(c=>[...c,""])}>+ Add Round</Btn>
        </div>
      )}

      <h3 style={secHead}>Mode</h3>
      <div style={{display:"flex",gap:10,marginBottom:24}}>
        {[{v:false,l:"👤 Individual"},{v:true,l:"👥 Team Mode"}].map(({v,l})=>(
          <button key={String(v)} onClick={()=>setTeamMode(v)}
            style={{flex:1,padding:"14px 0",fontSize:14,fontWeight:700,background:teamMode===v?C.tomato:C.card,color:teamMode===v?C.white:C.ink,border:`2px solid ${C.ink}`,borderRadius:12,cursor:"pointer",boxShadow:teamMode===v?`3px 3px 0 ${C.ink}`:"none"}}>
            {l}
          </button>
        ))}
      </div>

      {!teamMode&&(
        <div style={{...S.card,padding:16,marginBottom:24}}>
          <h3 style={{...secHead,marginBottom:12}}>Select Players</h3>
          {allPool.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>{allPool.map(n=><button key={n} onClick={()=>toggleSolo(n)} style={{background:solo.includes(n)?C.tomato:C.white,border:`2px solid ${C.ink}`,color:solo.includes(n)?C.white:C.ink,borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer",fontWeight:700}}>{solo.includes(n)?"✓ ":""}{n}</button>)}</div>}
          <div style={{display:"flex",gap:8}}><input style={{...inp,flex:1}} placeholder="Add new player…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNew()}/><Btn primary onClick={addNew}>Add</Btn></div>
        </div>
      )}

      {teamMode&&(
        <div style={{...S.card,padding:16,marginBottom:24}}>
          <h3 style={{...secHead,marginBottom:10}}>Number of Teams</h3>
          <div style={{display:"flex",gap:8,marginBottom:20}}>{[2,3,4].map(n=><button key={n} onClick={()=>setNumTeams(n)} style={{flex:1,padding:"10px 0",fontSize:15,fontWeight:700,background:numTeams===n?C.tomato:C.white,color:numTeams===n?C.white:C.ink,border:`2px solid ${C.ink}`,borderRadius:10,cursor:"pointer"}}>{n} Teams</button>)}</div>
          <h3 style={{...secHead,marginBottom:10}}>Team Names</h3>
          {teams.slice(0,numTeams).map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:20}}>{TEAM_EMOJIS[i]}</span>
              <input style={{...inp,flex:1,borderColor:TEAM_COLORS[i]}} value={t.name} onChange={e=>setTeams(prev=>prev.map((x,j)=>j===i?{...x,name:e.target.value}:x))}/>
            </div>
          ))}
          <h3 style={{...secHead,marginTop:20,marginBottom:10}}>Assign Players</h3>
          {allPool.length===0&&<p style={{color:C.muted,fontSize:13,marginBottom:8}}>Add players below to assign them.</p>}
          {allPool.map(name=>{const ti=teams.slice(0,numTeams).findIndex(t=>t.members.includes(name));return(
            <div key={name} style={{display:"flex",alignItems:"center",gap:8,background:C.white,border:`2px solid ${C.ink}`,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
              <span style={{flex:1,fontSize:14,fontWeight:700}}>{name}</span>
              <div style={{display:"flex",gap:6}}>{teams.slice(0,numTeams).map((t,i)=><button key={i} onClick={()=>assignTeam(name,i)} style={{width:34,height:34,borderRadius:8,border:`2px solid ${ti===i?TEAM_COLORS[i]:C.ink}`,background:ti===i?TEAM_COLORS[i]:C.white,color:ti===i?C.white:C.ink,fontSize:16,cursor:"pointer",fontWeight:700}}>{TEAM_EMOJIS[i]}</button>)}</div>
            </div>
          );})}
          <div style={{display:"flex",gap:8,marginTop:12}}><input style={{...inp,flex:1}} placeholder="Add new player…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNew()}/><Btn primary onClick={addNew}>Add</Btn></div>
          <div style={{marginTop:16}}>{teams.slice(0,numTeams).map((t,i)=><div key={i} style={{borderLeft:`4px solid ${TEAM_COLORS[i]}`,paddingLeft:12,marginBottom:8}}><span style={{fontWeight:700,color:TEAM_COLORS[i]}}>{TEAM_EMOJIS[i]} {t.name}</span><span style={{color:C.muted,fontSize:12,marginLeft:8}}>{t.members.length?t.members.join(", "):"Empty"}</span></div>)}</div>
        </div>
      )}

      <Btn full primary disabled={!canStart} onClick={()=>dispatch({type:"START_GAME",gameKey,players:teamMode?teams.slice(0,numTeams).map(t=>t.name):solo,cats:validCats,customName:custName,customEmoji:custEmoji,teamMode,teams:teamMode?teams.slice(0,numTeams):null})}>Start Game →</Btn>
    </div>
  );
}

// ── Game ──────────────────────────────────────────────────────────────────────
function GameScreen({state,dispatch,finishGame}){
  const game=state.current;
  const [newCat,setNewCat]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [dumbMode,setDumbMode]=useState(false);
  const [dumbPi,setDumbPi]=useState(null);
  const [dumbCat,setDumbCat]=useState(null);
  if(!game) return null;
  const playerTotals=game.players.map(calcTotal);
  const leaderboardRows=game.teamMode&&game.teams
    ?game.teams.map(team=>{const mems=game.players.filter(p=>team.members.includes(p.name));const total=mems.reduce((s,p)=>s+calcTotal(p),0);return{label:team.name,sub:team.members.join(", "),total};}).sort((a,b)=>b.total-a.total)
    :[...game.players].map((p,i)=>({label:p.name,sub:null,total:playerTotals[i]})).sort((a,b)=>b.total-a.total);
  const maxLeaderTotal=Math.max(...leaderboardRows.map(r=>r.total),1);
  function teamColor(name){if(!game.teamMode||!game.teams) return null;const i=game.teams.findIndex(t=>t.members.includes(name));return i>=0?TEAM_COLORS[i]:null;}
  return(
    <div style={{padding:"20px 20px 120px"}}>
      <TopBar title={`${game.emoji} ${game.gameName}`} onBack={()=>dispatch({type:"GO",screen:"home"})}/>
      <div style={{...S.limeCard,padding:16,marginBottom:16}}>
        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:2,marginBottom:12}}>Live Scores</div>
        {leaderboardRows.map(({label,sub,total},ri)=>{
          const tc=game.teamMode&&game.teams?TEAM_COLORS[game.teams.findIndex(t=>t.name===label)]:null;
          return(<div key={label} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontWeight:700}}>{ri===0?"🏆 ":""}<span style={{color:tc||C.ink}}>{label}</span>{sub&&<span style={{fontSize:11,color:C.muted,marginLeft:6}}>({sub})</span>}</span>
              <span style={{fontWeight:900,color:ri===0?C.tomato:C.ink}}>{total}</span>
            </div>
            <div style={{height:8,background:"rgba(0,0,0,0.15)",borderRadius:4,overflow:"hidden",border:`1px solid ${C.ink}`}}>
              <div style={{height:"100%",width:`${(total/maxLeaderTotal)*100}%`,background:tc||(ri===0?C.tomato:C.ink),borderRadius:4,transition:"width 0.3s"}}/>
            </div>
          </div>);
        })}
      </div>

      <button onClick={()=>setDumbMode(d=>!d)}
        style={{width:"100%",marginBottom:16,padding:"14px",fontSize:15,fontWeight:700,borderRadius:14,border:`2px solid ${C.ink}`,cursor:"pointer",background:dumbMode?C.tomato:C.card,color:dumbMode?C.white:C.ink,boxShadow:`3px 3px 0 ${C.ink}`,transition:"all 0.15s"}}>
        {dumbMode?"🚪 Exit Clicker Mode":"👆 Clicker Mode"}
      </button>

      <div style={{...S.card,overflow:"hidden",padding:0,marginBottom:8}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
            <thead>
              <tr style={{background:C.ink}}>
                <th style={{textAlign:"left",padding:"10px 12px",color:C.white,fontWeight:700,fontSize:12,letterSpacing:1}}>CATEGORY</th>
                {game.players.map(p=><th key={p.name} style={{padding:"10px 8px",fontSize:12,textAlign:"center",minWidth:60,color:C.white}}>{p.name}{game.teamMode&&p.team?<div style={{fontSize:9,opacity:0.7}}>{p.team}</div>:null}</th>)}
              </tr>
            </thead>
            <tbody>
              {game.categories.map((cat,ci)=>(
                <tr key={cat} style={{background:ci%2===0?C.white:C.card}}>
                  <td style={{padding:"8px 12px",color:C.ink,fontSize:13,fontWeight:700}}>{cat}</td>
                  {game.players.map((p,pi)=>{const isSel=dumbMode&&dumbPi===pi&&dumbCat===cat;return(
                    <td key={p.name} style={{padding:4,textAlign:"center"}}>
                      {dumbMode
                        ?<div onClick={()=>{setDumbPi(pi);setDumbCat(cat);}} style={{width:54,margin:"0 auto",background:isSel?C.tomato:C.white,border:`2px solid ${isSel?C.tomato:C.ink}`,borderRadius:8,color:isSel?C.white:C.ink,textAlign:"center",padding:"8px 4px",fontSize:15,cursor:"pointer",fontWeight:700}}>{p.scores[cat]||0}</div>
                        :<input type="number" inputMode="numeric" style={{width:54,background:C.white,border:`2px solid ${C.ink}`,borderRadius:8,color:C.ink,textAlign:"center",padding:"8px 4px",fontSize:15,fontWeight:700}} value={p.scores[cat]} onChange={e=>dispatch({type:"SET_SCORE",pi,cat,val:e.target.value})}/>
                      }
                    </td>
                  );})}
                </tr>
              ))}
              <tr style={{background:C.tomato}}>
                <td style={{padding:"10px 12px",fontWeight:900,color:C.white,fontFamily:"Georgia,serif"}}>TOTAL</td>
                {playerTotals.map((t,i)=><td key={i} style={{textAlign:"center",fontWeight:900,color:C.white,fontSize:18,fontFamily:"Georgia,serif"}}>{t}</td>)}
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      {showAdd?(<div style={{marginTop:12,display:"flex",gap:8}}><input style={{...inp,flex:1}} placeholder="Category name" value={newCat} onChange={e=>setNewCat(e.target.value)}/><Btn primary onClick={()=>{if(newCat.trim()){dispatch({type:"ADD_CATEGORY",cat:newCat.trim()});setNewCat("");setShowAdd(false);}}}>Add</Btn></div>):<Btn onClick={()=>setShowAdd(true)} style={{marginTop:12}}>+ Add Row</Btn>}

      <div style={{position:"fixed",bottom:56,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 20px",background:C.card,borderTop:`3px solid ${C.ink}`}}>
        {dumbMode?(<div>
          <div style={{textAlign:"center",fontSize:12,color:dumbPi!==null&&dumbCat?C.ink:C.muted,marginBottom:8,fontWeight:700}}>
            {dumbPi!==null&&dumbCat?<span>{game.players[dumbPi]?.name} · {dumbCat} · <span style={{color:C.tomato}}>{parseInt(game.players[dumbPi]?.scores[dumbCat])||0} pts</span></span>:"Tap a score cell to select it"}
          </div>
          <div style={{display:"flex",gap:12}}>
            {[{delta:-1,bg:"#c0392b",label:"−"},{delta:1,bg:"#27ae60",label:"+"}].map(({delta,bg,label})=>{const active=dumbPi!==null&&dumbCat;return(
              <button key={label} disabled={!active} onClick={()=>{if(!active) return;const cur=parseInt(game.players[dumbPi]?.scores[dumbCat])||0;dispatch({type:"SET_SCORE",pi:dumbPi,cat:dumbCat,val:String(cur+delta)});}}
                style={{flex:1,padding:"20px 0",fontSize:40,fontWeight:900,borderRadius:16,border:`2px solid ${C.ink}`,cursor:active?"pointer":"not-allowed",background:active?bg:"#ccc",color:active?C.white:C.muted,boxShadow:active?`3px 3px 0 ${C.ink}`:"none"}}>
                {label}
              </button>
            );})}
          </div>
        </div>):<Btn full primary onClick={finishGame}>✅ Finish &amp; Save Game</Btn>}
      </div>
    </div>
  );
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function LeaderboardScreen({state}){
  const [tab,setTab]=useState("topPlayer");
  const lb=buildLeaderboard(state.history);
  const maxG=Math.max(...lb.map(p=>p.games),1);
  const tabs=[
    {id:"topPlayer",icon:"⭐",label:"Top Player",  sort:(a,b)=>(b.winRate*0.6+(b.games/maxG)*0.4)-(a.winRate*0.6+(a.games/maxG)*0.4),val:p=>`${Math.round((p.winRate*0.6+(p.games/maxG)*0.4)*100)}pts`,sub:"60% win rate + 40% volume"},
    {id:"mostWins", icon:"🏆",label:"Most Wins",   sort:(a,b)=>b.wins-a.wins,      val:p=>`${p.wins%1===0?p.wins:p.wins.toFixed(2)}W`,   sub:"Total wins (fractional for team games)"},
    {id:"topTime",  icon:"🎮",label:"Top Game Time",sort:(a,b)=>b.games-a.games,   val:p=>`${p.games}G`,                                 sub:"Most games played"},
  ];
  const cur=tabs.find(t=>t.id===tab);
  const sorted=lb.length?[...lb].sort(cur.sort):[];
  if(!lb.length) return <div style={{padding:"20px 20px 80px"}}><h2 style={{fontFamily:"Georgia,serif",fontWeight:900,color:C.ink,marginBottom:16}}>🏆 Leaderboard</h2><p style={{color:C.muted,textAlign:"center",marginTop:60}}>Play some games first!</p></div>;
  return(
    <div style={{padding:"20px 20px 80px"}}>
      <h2 style={{fontFamily:"Georgia,serif",fontWeight:900,color:C.ink,marginBottom:16}}>🏆 Leaderboard</h2>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:12,marginBottom:20}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flexShrink:0,background:tab===t.id?C.tomato:C.card,border:`2px solid ${C.ink}`,color:tab===t.id?C.white:C.ink,borderRadius:20,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:700,boxShadow:tab===t.id?`2px 2px 0 ${C.ink}`:"none"}}>{t.icon} {t.label}</button>)}
      </div>
      {sorted.length>=3&&(
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:8,marginBottom:24,height:130}}>
          {[sorted[1],sorted[0],sorted[2]].map((p,ri)=>{const h=[90,130,75][ri];const medals=["🥈","🥇","🥉"];const bgs=[C.bg,C.lime,C.card];return(
            <div key={p.name} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end"}}>
              <div style={{fontSize:12,color:C.ink,marginBottom:2,textAlign:"center",fontWeight:700}}>{p.name}</div>
              <div style={{fontSize:12,color:C.tomato,marginBottom:4,fontWeight:900}}>{cur.val(p)}</div>
              <div style={{width:"100%",height:h,background:bgs[ri],border:`2px solid ${C.ink}`,borderRadius:"8px 8px 0 0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>{medals[ri]}</div>
            </div>
          );})}
        </div>
      )}
      <h3 style={{...secHead,marginBottom:12}}>{cur.sub}</h3>
      {sorted.map((p,i)=>(
        <div key={p.name} style={{...S.card,padding:"12px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,background:i===0?C.lime:C.card}}>
          <span style={{fontSize:22,width:28,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontFamily:"Georgia,serif",fontSize:16}}>{p.name}</div>
            <div style={{fontSize:11,color:C.muted}}>{p.wins%1===0?p.wins:p.wins.toFixed(2)}W / {p.games}G</div>
          </div>
          <div style={{fontWeight:900,color:C.tomato,fontSize:20,fontFamily:"Georgia,serif"}}>{cur.val(p)}</div>
        </div>
      ))}
    </div>
  );
}

// ── History ───────────────────────────────────────────────────────────────────
function HistoryScreen({state,dispatch}){
  return(
    <div style={{padding:"20px 20px 80px"}}>
      <h2 style={{fontFamily:"Georgia,serif",fontWeight:900,color:C.ink,marginBottom:16}}>📋 History</h2>
      {!state.history.length?<p style={{color:C.muted,textAlign:"center",marginTop:60}}>No games yet!</p>:state.history.map(g=><HistoryCard key={g.id} game={g} dispatch={dispatch}/>)}
    </div>
  );
}

function HistoryCard({game,dispatch}){
  const winner=[...game.players].sort((a,b)=>calcTotal(b)-calcTotal(a))[0];
  const displayName = game.gameName || (BUILT_IN_GAMES[game.gameKey]?.name) || "Unknown Game";
  return(
    <div onClick={()=>dispatch({type:"GO",screen:"historyDetail",id:game.id})} style={{...S.card,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:"Georgia,serif",fontWeight:700}}>{game.emoji} {displayName}</span><span style={{color:C.muted,fontSize:11}}>{new Date(game.finishedAt||game.startedAt).toLocaleDateString()}</span></div>
      <div style={{marginTop:6,color:C.tomato,fontSize:13,fontWeight:700}}>🏆 {winner?.name} — {calcTotal(winner)} pts</div>
      <div style={{marginTop:4,color:C.muted,fontSize:11}}>{game.players.map(p=>p.name).join(", ")}</div>
    </div>
  );
}

function HistoryDetail({state,dispatch}){
  const game=state.history.find(g=>g.id===state.detailId);
  if(!game) return null;
  const totals=game.players.map(calcTotal);
  const sorted=[...game.players].map((p,i)=>({p,t:totals[i]})).sort((a,b)=>b.t-a.t);
  return(
    <div style={{padding:"20px 20px 80px"}}>
      <TopBar title={`${game.emoji} ${game.gameName}`} onBack={()=>dispatch({type:"GO",screen:"history"})}/>
      <p style={{color:C.muted,fontSize:12,marginBottom:16}}>{new Date(game.finishedAt||game.startedAt).toLocaleDateString("en-GB",{dateStyle:"long"})}</p>
      <div style={{...S.limeCard,padding:16,marginBottom:20}}>{sorted.map(({p,t},ri)=><div key={p.name} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:ri<sorted.length-1?`1px solid ${C.ink}`:"none"}}><span style={{fontWeight:700}}>{ri===0?"🏆 ":`${ri+1}. `}{p.name}</span><span style={{color:C.tomato,fontWeight:900}}>{t} pts</span></div>)}</div>
      <div style={{...S.card,overflow:"hidden",padding:0}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
          <thead><tr style={{background:C.ink}}><th style={{textAlign:"left",padding:"10px 12px",color:C.white,fontSize:11}}>CATEGORY</th>{game.players.map(p=><th key={p.name} style={{padding:"10px 8px",color:C.white,fontSize:11,textAlign:"center"}}>{p.name}</th>)}</tr></thead>
          <tbody>{game.categories.map((cat,ci)=><tr key={cat} style={{background:ci%2===0?C.white:C.card}}><td style={{padding:"8px 12px",color:C.ink,fontWeight:700}}>{cat}</td>{game.players.map(p=><td key={p.name} style={{textAlign:"center",padding:"8px 4px",fontWeight:700}}>{p.scores[cat]||0}</td>)}</tr>)}</tbody>
        </table>
      </div>
      <Btn full onClick={()=>{
        if(window.confirm("Delete this game? This can't be undone.")) {
          dispatch({type:"DELETE_HISTORY",id:game.id});
          dispatch({type:"GO",screen:"history"});
        }
      }} style={{marginTop:20,background:"#fde8e8",color:"#c0392b",borderColor:"#c0392b"}}>🗑 Delete Game</Btn>
    </div>
  );
}

// ── Family ────────────────────────────────────────────────────────────────────
function FamilyScreen({state,dispatch}){
  const [pw,setPw]=useState("");
  const [loading,setLoading]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [msg,setMsg]=useState("");
  const [uploadMsg,setUploadMsg]=useState("");

  async function join(){
    if(!pw.trim()) return;setLoading(true);setMsg("");
    const code=pw.trim().toLowerCase().replace(/\s+/g,"-");
    const games=await dbLoad(code);
    if(games===null){await dbSave(code,[]);setMsg(`✅ Created "${code}"! Share this password.`);}
    else{setMsg(`✅ Joined "${code}" — ${games.length} games found.`);dispatch({type:"SYNC_HISTORY",history:games});}
    dispatch({type:"SET_FAMILY",family:code});
    setLoading(false);
  }

  async function uploadLocal(){
    if(!state.family||!sb) return;
    setUploading(true);setUploadMsg("");
    const local=state.history.filter(g=>g.finished);
    if(!local.length){setUploadMsg("No finished games to upload.");setUploading(false);return;}
    const remote=await dbLoad(state.family)||[];
    const remoteIds=new Set(remote.map(g=>g.id));
    const toAdd=local.filter(g=>!remoteIds.has(g.id));
    if(!toAdd.length){setUploadMsg("✅ All games already synced.");setUploading(false);return;}
    const merged=[...remote,...toAdd].sort((a,b)=>new Date(b.finishedAt||b.startedAt)-new Date(a.finishedAt||a.startedAt));
    await dbSave(state.family,merged);
    dispatch({type:"SYNC_HISTORY",history:merged});
    setUploadMsg(`✅ Uploaded ${toAdd.length} game${toAdd.length>1?"s":""}!`);
    setUploading(false);
  }

  function leave(){dispatch({type:"SET_FAMILY",family:null});setMsg("");setPw("");setUploadMsg("");}

  return(
    <div style={{padding:"20px 20px 80px"}}>
      <h2 style={{fontFamily:"Georgia,serif",fontWeight:900,color:C.ink,marginBottom:8}}>👨‍👩‍👧 Family Space</h2>
      <p style={{color:C.white,fontSize:13,marginBottom:24}}>Share scores across devices with a shared password.</p>
      {!sb&&<div style={{...S.limeCard,padding:14,marginBottom:20,fontSize:13,color:C.muted}}>⚠️ Supabase not configured. Add your credentials to enable sync.</div>}
      {state.family?(
        <div>
          <div style={{...S.limeCard,padding:20,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:8}}>👨‍👩‍👧</div>
            <div style={{fontWeight:900,fontSize:20,fontFamily:"Georgia,serif",color:C.ink,marginBottom:4}}>{state.family}</div>
            <div style={{color:C.muted,fontSize:12}}>{state.history.length} shared games</div>
          </div>
          <div style={{...S.card,padding:16,marginBottom:16,background:"#e8f4fd",borderColor:"#3498db"}}>
            <div style={{fontWeight:700,marginBottom:6,fontSize:14}}>📤 Upload saved games</div>
            <p style={{color:C.muted,fontSize:12,marginBottom:12}}>Have games saved before joining? Upload them so everyone can see them.</p>
            <button onClick={uploadLocal} disabled={uploading||!sb}
              style={{width:"100%",padding:"14px",fontSize:15,fontWeight:700,borderRadius:12,border:`2px solid ${C.ink}`,cursor:uploading||!sb?"not-allowed":"pointer",background:uploading||!sb?"#ccc":"#3498db",color:C.white,boxShadow:`3px 3px 0 ${C.ink}`}}>
              {uploading?"Uploading…":"⬆️ Upload my saved games to family"}
            </button>
            {uploadMsg&&<div style={{marginTop:10,fontSize:12,color:C.tomato,fontWeight:700}}>{uploadMsg}</div>}
          </div>
          <div style={{...S.card,padding:16,marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>Share with friends:</div>
            <ol style={{color:C.muted,fontSize:13,paddingLeft:20,lineHeight:2}}>
              <li>Send them your URL</li>
              <li>They tap the Family tab</li>
              <li>Enter password: <b style={{color:C.tomato}}>{state.family}</b></li>
            </ol>
          </div>
          <Btn full onClick={leave} style={{background:"#fde8e8",color:"#c0392b",borderColor:"#c0392b"}}>Leave Family Space</Btn>
        </div>
      ):(
        <div>
          <input style={{...inp,marginBottom:12}} placeholder="e.g. smithfamily" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&join()}/>
          <Btn full primary onClick={join} disabled={loading||!pw.trim()||!sb}>{loading?"Connecting…":"Join / Create Space →"}</Btn>
          {msg&&<div style={{...S.card,marginTop:16,padding:14,fontSize:13,color:C.muted}}>{msg}</div>}
        </div>
      )}
    </div>
  );
}

// ── Shared UI ─────────────────────────────────────────────────────────────────
function TopBar({title,onBack}){return <div style={{display:"flex",alignItems:"center",marginBottom:24,gap:12}}><button onClick={onBack} style={{background:C.card,border:`2px solid ${C.ink}`,color:C.ink,borderRadius:8,padding:"8px 14px",cursor:"pointer",fontSize:18,fontWeight:900,boxShadow:`2px 2px 0 ${C.ink}`}}>←</button><h2 style={{margin:0,fontSize:20,fontFamily:"Georgia,serif",fontWeight:900,color:C.ink}}>{title}</h2></div>;}
function Btn({children,onClick,full,primary,disabled,style}){return <button onClick={onClick} disabled={disabled} style={{width:full?"100%":"auto",background:primary?C.tomato:C.card,color:disabled?C.muted:primary?C.white:C.ink,border:`2px solid ${disabled?C.muted:C.ink}`,borderRadius:12,padding:"14px 20px",fontSize:15,cursor:disabled?"not-allowed":"pointer",fontWeight:700,boxShadow:disabled?"none":`3px 3px 0 ${C.ink}`,...style}}>{children}</button>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
